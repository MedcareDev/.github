name: Reusable — Node.js Backend CI/CD

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      compose-service:
        description: 'Docker Compose service key (defaults to service-name if not set)'
        default: ''
        type: string
      node-version:
        default: '20'
        type: string
      run-lint:
        default: false
        type: boolean
      run-tests:
        default: false
        type: boolean
    secrets:
      YC_SA_KEY:
        required: true
      MK_SSH_KEY:
        required: true
      MK_SSH_HOST:
        required: true
      MKS_SSH_KEY:
        required: false
      MKS_SSH_HOST:
        required: false
      GH_PACKAGES_TOKEN:
        required: false

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Configure git for private packages
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          echo "GH_TOKEN set: $(if [ -n "$GH_TOKEN" ]; then echo YES length=${#GH_TOKEN} prefix=${GH_TOKEN:0:4}; else echo NO; fi)"
          if [ -n "$GH_TOKEN" ]; then
            B64=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)
            git config --global --unset-all http."https://github.com/".extraHeader || true
            git config --global http."https://github.com/".extraHeader "Authorization: Basic ${B64}"
            git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
            git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
            echo "=== testing git ls-remote ==="
            git ls-remote https://github.com/MedcareDev/mcMongoConnector.git HEAD 2>&1 | head -3 || echo "FAILED exit=$?"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: ${{ inputs.run-lint }}
        run: npm run lint

      - name: Test
        if: ${{ inputs.run-tests }}
        run: npm test

  build:
    name: Build & Push
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    outputs:
      image: ${{ steps.build.outputs.image }}
      service: ${{ inputs.service-name }}
      compose-service: ${{ steps.build.outputs.compose-service }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker login (Yandex Container Registry)
        run: |
          echo '${{ secrets.YC_SA_KEY }}' | \
            docker login cr.yandex --username json_key --password-stdin

      - name: Build & Push image
        id: build
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          TAG=$(git rev-parse --short HEAD)
          IMAGE="cr.yandex/crpm3o5it12l205kdqa4/${{ inputs.service-name }}:${TAG}"
          SECRET_ARGS=""
          if [ -n "$GH_PACKAGES_TOKEN" ]; then
            printf '%s' "$GH_PACKAGES_TOKEN" > /tmp/github_token.txt
            SECRET_ARGS="--secret id=github_token,src=/tmp/github_token.txt"
          fi
          DOCKER_BUILDKIT=1 docker build $SECRET_ARGS -t "$IMAGE" .
          [ -f /tmp/github_token.txt ] && rm -f /tmp/github_token.txt
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          COMPOSE_SVC="${{ inputs.compose-service }}"
          echo "compose-service=${COMPOSE_SVC:-${{ inputs.service-name }}}" >> $GITHUB_OUTPUT

  deploy-staging:
    name: Deploy to Staging (MK-corp)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Deploy to MK-corp
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          SERVICE: ${{ needs.build.outputs.service }}
          COMPOSE_SERVICE: ${{ needs.build.outputs.compose-service }}
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
        with:
          host: ${{ secrets.MKS_SSH_HOST }}
          username: medcare_admin
          key: ${{ secrets.MKS_SSH_KEY }}
          envs: IMAGE,SERVICE,COMPOSE_SERVICE,YC_SA_KEY
          script: |
            set -e
            echo "$YC_SA_KEY" | docker login cr.yandex --username json_key --password-stdin
            COMPOSE_FILE="/home/medcare_admin/docker-compose.yml"
            sed -i "s|cr.yandex/crpm3o5it12l205kdqa4/${SERVICE}:[^ ]*|${IMAGE}|g" "$COMPOSE_FILE"
            docker compose -f "$COMPOSE_FILE" pull "$COMPOSE_SERVICE"
            docker compose -f "$COMPOSE_FILE" up -d "$COMPOSE_SERVICE"
            echo "Deployed ${IMAGE} to staging"

  deploy-prod:
    name: Deploy to Prod (MK)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to MK
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          SERVICE: ${{ needs.build.outputs.service }}
          COMPOSE_SERVICE: ${{ needs.build.outputs.compose-service }}
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
        with:
          host: ${{ secrets.MK_SSH_HOST }}
          username: medcare_admin
          key: ${{ secrets.MK_SSH_KEY }}
          envs: IMAGE,SERVICE,COMPOSE_SERVICE,YC_SA_KEY
          script: |
            set -e
            echo "$YC_SA_KEY" | docker login cr.yandex --username json_key --password-stdin
            COMPOSE_FILE="/home/medcare_admin/docker-compose.yml"
            sed -i "s|cr.yandex/crpm3o5it12l205kdqa4/${SERVICE}:[^ ]*|${IMAGE}|g" "$COMPOSE_FILE"
            docker compose -f "$COMPOSE_FILE" pull "$COMPOSE_SERVICE"
            docker compose -f "$COMPOSE_FILE" up -d "$COMPOSE_SERVICE"
            echo "Deployed ${IMAGE} to prod"
