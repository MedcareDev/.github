name: Reusable — Nuxt Frontend CI/CD

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      node-version:
        default: '20'
        type: string
    secrets:
      YC_SA_KEY:
        required: true
      MK_SSH_KEY:
        required: true
      MK_SSH_HOST:
        required: true
      MKS_SSH_KEY:
        required: false
      MKS_SSH_HOST:
        required: false

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (verify compilability)
        run: npm run build

  build:
    name: Docker Build & Push
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    outputs:
      image: ${{ steps.build.outputs.image }}
      service: ${{ inputs.service-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker login (Yandex Container Registry)
        run: |
          echo '${{ secrets.YC_SA_KEY }}' | \
            docker login cr.yandex --username json_key --password-stdin

      - name: Build & Push image
        id: build
        run: |
          TAG=$(git rev-parse --short HEAD)
          IMAGE="cr.yandex/crpm3o5it12l205kdqa4/${{ inputs.service-name }}:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy-staging:
    name: Deploy to Staging (MK-corp)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Deploy to MK-corp
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          SERVICE: ${{ needs.build.outputs.service }}
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
        with:
          host: ${{ secrets.MKS_SSH_HOST }}
          username: medcare_admin
          key: ${{ secrets.MKS_SSH_KEY }}
          envs: IMAGE,SERVICE,YC_SA_KEY
          script: |
            set -e
            echo "$YC_SA_KEY" | docker login cr.yandex --username json_key --password-stdin
            COMPOSE_FILE="/home/medcare_admin/docker-compose.yml"
            sed -i "s|cr.yandex/crpm3o5it12l205kdqa4/${SERVICE}:[^ ]*|${IMAGE}|g" "$COMPOSE_FILE"
            docker compose -f "$COMPOSE_FILE" pull "$SERVICE"
            docker compose -f "$COMPOSE_FILE" up -d "$SERVICE"
            docker exec medcare_admin-customer_front_proxy-1 nginx -s reload
            echo "Deployed ${IMAGE} to staging"

  deploy-prod:
    name: Deploy to Prod (MK)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to MK
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ needs.build.outputs.image }}
          SERVICE: ${{ needs.build.outputs.service }}
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
        with:
          host: ${{ secrets.MK_SSH_HOST }}
          username: medcare_admin
          key: ${{ secrets.MK_SSH_KEY }}
          envs: IMAGE,SERVICE,YC_SA_KEY
          script: |
            set -e
            echo "$YC_SA_KEY" | docker login cr.yandex --username json_key --password-stdin
            COMPOSE_FILE="/home/medcare_admin/docker-compose.yml"
            sed -i "s|cr.yandex/crpm3o5it12l205kdqa4/${SERVICE}:[^ ]*|${IMAGE}|g" "$COMPOSE_FILE"
            docker compose -f "$COMPOSE_FILE" pull "$SERVICE"
            docker compose -f "$COMPOSE_FILE" up -d "$SERVICE"
            docker exec medcare_admin-customer_front_proxy-1 nginx -s reload
            echo "Deployed ${IMAGE} to prod"
